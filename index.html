<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6)); }
        }

        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: bold;
            color: #feca57;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .choice-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .choice-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transition: all 0.6s ease;
            transform: translate(-50%, -50%);
        }

        .choice-btn:hover::before {
            width: 100%;
            height: 100%;
        }

        .choice-btn span {
            position: relative;
            z-index: 1;
        }

        .battle-area {
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .battle-display {
            display: none;
            align-items: center;
            gap: 30px;
        }

        .battle-choice {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .battle-emoji {
            font-size: 4rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-20px); }
        }

        .vs {
            font-size: 2rem;
            font-weight: bold;
            color: #feca57;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .win {
            color: #2ecc71;
            animation: celebrate 0.8s ease;
        }

        .lose {
            color: #e74c3c;
            animation: shake 0.8s ease;
        }

        .tie {
            color: #f39c12;
            animation: wobble 0.8s ease;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .reset-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .choice-btn {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }
            
            .battle-emoji {
                width: 80px;
                height: 80px;
                font-size: 3rem;
            }
            
            .battle-display {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Rock Paper Scissors</h1>
        <p class="subtitle">Choose your weapon and battle the computer!</p>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">You</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Ties</div>
                <div class="score-value" id="tieScore">0</div>
            </div>
        </div>

        <div class="choices">
            <button class="choice-btn" data-choice="rock">
                <span>🪨</span>
            </button>
            <button class="choice-btn" data-choice="paper">
                <span>📄</span>
            </button>
            <button class="choice-btn" data-choice="scissors">
                <span>✂️</span>
            </button>
        </div>

        <div class="battle-area">
            <div class="battle-display" id="battleDisplay">
                <div class="battle-choice">
                    <div class="battle-emoji" id="playerChoice"></div>
                    <div>You</div>
                </div>
                <div class="vs">VS</div>
                <div class="battle-choice">
                    <div class="battle-emoji" id="computerChoice"></div>
                    <div>Computer</div>
                </div>
            </div>
        </div>

        <div class="result-message" id="resultMessage"></div>
        
        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        let playerScore = 0;
        let computerScore = 0;
        let tieScore = 0;

        const choices = ['rock', 'paper', 'scissors'];
        const emojis = {
            rock: '🪨',
            paper: '📄',
            scissors: '✂️'
        };

        const choiceButtons = document.querySelectorAll('.choice-btn');
        const battleDisplay = document.getElementById('battleDisplay');
        const playerChoiceEl = document.getElementById('playerChoice');
        const computerChoiceEl = document.getElementById('computerChoice');
        const resultMessage = document.getElementById('resultMessage');
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const tieScoreEl = document.getElementById('tieScore');

        choiceButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                const playerChoice = e.currentTarget.dataset.choice;
                playGame(playerChoice);
            });
        });

        function playGame(playerChoice) {
            const computerChoice = choices[Math.floor(Math.random() * choices.length)];
            
            // Show battle display
            battleDisplay.style.display = 'flex';
            
            // Set choices with animation
            playerChoiceEl.textContent = emojis[playerChoice];
            computerChoiceEl.textContent = emojis[computerChoice];
            
            // Add bounce animation
            playerChoiceEl.style.animation = 'none';
            computerChoiceEl.style.animation = 'none';
            
            setTimeout(() => {
                playerChoiceEl.style.animation = 'bounce 0.6s ease';
                computerChoiceEl.style.animation = 'bounce 0.6s ease';
            }, 10);

            // Determine winner
            const result = determineWinner(playerChoice, computerChoice);
            
            // Update scores and display result
            setTimeout(() => {
                updateScore(result);
                displayResult(result, playerChoice, computerChoice);
            }, 600);
        }

        function determineWinner(player, computer) {
            if (player === computer) {
                return 'tie';
            }
            
            if (
                (player === 'rock' && computer === 'scissors') ||
                (player === 'paper' && computer === 'rock') ||
                (player === 'scissors' && computer === 'paper')
            ) {
                return 'win';
            }
            
            return 'lose';
        }

        function updateScore(result) {
            if (result === 'win') {
                playerScore++;
                playerScoreEl.textContent = playerScore;
            } else if (result === 'lose') {
                computerScore++;
                computerScoreEl.textContent = computerScore;
            } else {
                tieScore++;
                tieScoreEl.textContent = tieScore;
            }
        }

        function displayResult(result, playerChoice, computerChoice) {
            resultMessage.className = 'result-message ' + result;
            
            if (result === 'win') {
                resultMessage.textContent = `You Win! ${emojis[playerChoice]} beats ${emojis[computerChoice]}`;
            } else if (result === 'lose') {
                resultMessage.textContent = `You Lose! ${emojis[computerChoice]} beats ${emojis[playerChoice]}`;
            } else {
                resultMessage.textContent = `It's a Tie! Both chose ${emojis[playerChoice]}`;
            }
        }

        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            tieScore = 0;
            
            playerScoreEl.textContent = '0';
            computerScoreEl.textContent = '0';
            tieScoreEl.textContent = '0';
            
            battleDisplay.style.display = 'none';
            resultMessage.textContent = '';
            resultMessage.className = 'result-message';
        }

        // Add keyboard support
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'r':
                    playGame('rock');
                    break;
                case 'p':
                    playGame('paper');
                    break;
                case 's':
                    playGame('scissors');
                    break;
            }
        });
    </script>
</body>
</html>
